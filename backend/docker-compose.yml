services:
  postgres:
    image: postgres:16
    container_name: dalupotha-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dalupotha}
      POSTGRES_USER: ${POSTGRES_USER:-dalupotha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    volumes:
      - dalupotha_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  api-gateway:
    build: ./services/api-gateway
    container_name: dalupotha-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    develop:
      watch:
        - path: ./services/api-gateway/src
          action: rebuild
        - path: ./services/api-gateway/pom.xml
          action: rebuild
        - path: ./services/api-gateway/Dockerfile
          action: rebuild

  auth-service:
    build: ./services/auth-service
    container_name: dalupotha-auth-service
    ports:
      - "18081:8081"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: ${POSTGRES_USER:-dalupotha_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    develop:
      watch:
        - path: ./services/auth-service/src
          action: rebuild
        - path: ./services/auth-service/pom.xml
          action: rebuild
        - path: ./services/auth-service/Dockerfile
          action: rebuild

  collection-service:
    build: ./services/collection-service
    container_name: dalupotha-collection-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: collection_db
      DB_USER: ${POSTGRES_USER:-dalupotha_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    develop:
      watch:
        - path: ./services/collection-service/src
          action: rebuild
        - path: ./services/collection-service/pom.xml
          action: rebuild
        - path: ./services/collection-service/Dockerfile
          action: rebuild

  finance-service:
    build: ./services/finance-service
    container_name: dalupotha-finance-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-dalupotha}
      DB_USER: ${POSTGRES_USER:-dalupotha_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    develop:
      watch:
        - path: ./services/finance-service/src
          action: rebuild
        - path: ./services/finance-service/pom.xml
          action: rebuild
        - path: ./services/finance-service/Dockerfile
          action: rebuild

  inventory-service:
    build: ./services/inventory-service
    container_name: dalupotha-inventory-service
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-dalupotha}
      DB_USER: ${POSTGRES_USER:-dalupotha_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    develop:
      watch:
        - path: ./services/inventory-service/src
          action: rebuild
        - path: ./services/inventory-service/pom.xml
          action: rebuild
        - path: ./services/inventory-service/Dockerfile
          action: rebuild

  notification-service:
    build: ./services/notification-service
    container_name: dalupotha-notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    develop:
      watch:
        - path: ./services/notification-service/src
          action: rebuild
        - path: ./services/notification-service/pom.xml
          action: rebuild
        - path: ./services/notification-service/Dockerfile
          action: rebuild

  staffing-service:
    build: ./services/staffing-service
    container_name: dalupotha-staffing-service
    ports:
      - "8086:8086"
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-dalupotha}
      DB_USER: ${POSTGRES_USER:-dalupotha_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dalupotha_password}
    develop:
      watch:
        - path: ./services/staffing-service/src
          action: rebuild
        - path: ./services/staffing-service/pom.xml
          action: rebuild
        - path: ./services/staffing-service/Dockerfile
          action: rebuild

volumes:
  dalupotha_postgres_data:
