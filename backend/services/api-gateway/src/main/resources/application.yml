spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # All routes use lb:// to resolve via Eureka service names
      routes:
        # ── Auth Service ─────────────────────────────────────────
        # Doc: POST /auth/login, /auth/otp/send, /auth/otp/verify
        # Gateway rewrites /auth/** → /api/auth/** (upstream prefix)
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /api/auth/${segment}

        # ── Collection Service ───────────────────────────────────
        # Doc: POST /collection/sync, GET /collection/history/{id}
        - id: collection-service
          uri: lb://collection-service
          predicates:
            - Path=/collection/**
          filters:
            - AuthFilter
            - RewritePath=/collection/(?<segment>.*), /api/collection/${segment}

        # ── Finance Service ──────────────────────────────────────
        # Doc: POST /finance/advance-request, GET /finance/ledger/{id}
        - id: finance-service
          uri: lb://finance-service
          predicates:
            - Path=/finance/**
          filters:
            - AuthFilter
            - RewritePath=/finance/(?<segment>.*), /api/finance/${segment}

        # ── Services/Inventory ───────────────────────────────────
        # Doc: POST /services/request, PATCH /services/request/{id}/status
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/services/**
          filters:
            - AuthFilter
            - RewritePath=/services/(?<segment>.*), /api/services/${segment}

        # ── Staffing Service ─────────────────────────────────────
        - id: staffing-service
          uri: lb://staffing-service
          predicates:
            - Path=/staff/**
          filters:
            - AuthFilter
            - RewritePath=/staff/(?<segment>.*), /api/staff/${segment}

        # ── Notification Service ─────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - AuthFilter
            - RewritePath=/notifications/(?<segment>.*), /api/notifications/${segment}

      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
            allowed-headers: "*"
            allow-credentials: false

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
