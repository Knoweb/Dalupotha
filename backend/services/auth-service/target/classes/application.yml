spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dalupotha}
    username: ${DB_USER:dalupotha_user}
    password: ${DB_PASSWORD:dalupotha_password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

# JWT
jwt:
  secret: ${JWT_SECRET:dalupotha-super-secret-jwt-key-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Vonage SMS
vonage:
  api:
    key: ${VONAGE_API_KEY:dummy-key}
    secret: ${VONAGE_API_SECRET:dummy-secret}
  sender-id: ${VONAGE_SENDER_ID:VonageAPIs}
