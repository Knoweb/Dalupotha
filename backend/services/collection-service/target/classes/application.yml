spring:
  application:
    name: collection-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:collection_db}
    username: ${DB_USER:dalupotha_user}
    password: ${DB_PASSWORD:superman9}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dalupotha-super-secret-jwt-key-change-in-production-2024}

# Supabase Realtime — broadcasts synced collections to the web dashboard live
supabase:
  url: ${SUPABASE_URL:https://placeholder.supabase.co}
  anon-key: ${SUPABASE_ANON_KEY:placeholder}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:placeholder}
  realtime-channel: ${SUPABASE_REALTIME_CHANNEL:leaf_collections_sync}

management:
  endpoints:
    web:
      exposure:
        include: health,info
