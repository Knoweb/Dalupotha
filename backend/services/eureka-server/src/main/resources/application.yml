spring:
  application:
    name: eureka-server

server:
  port: 8761

eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
  client:
    # This server does not register itself as a client
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  server:
    enable-self-preservation: false   # easier for dev — disable in prod
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info
