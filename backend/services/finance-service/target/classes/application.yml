spring:
  application:
    name: finance-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dalupotha}
    username: ${DB_USER:dalupotha_user}
    password: ${DB_PASSWORD:dalupotha_password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

dalupotha:
  services:
    auth-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
